server.port=8100
spring.application.name=gateway-service
server.forward-headers-strategy=framework

internal.gateway.service.name=pw-gateway
internal.header.name=pw-service-name
internal.access.service.hostname=http://${SERVER_IP}:8100

internal.iam.service.name=iam-service
internal.utils.service.name=utils-service

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.api-docs.groups.enabled=true

springdoc.swagger-ui.urls[0].url=/v3/api-docs
springdoc.swagger-ui.urls[0].name=gateway

springdoc.swagger-ui.urls[1].url=/iam-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=iam-service

springdoc.swagger-ui.urls[2].url=/utils-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=utils-service

internal.inner.auth.filter=InnerAuthFilter
internal.token.validation.filter=TokenValidationFilter

spring.cloud.gateway.httpclient.connect-timeout=70000
spring.cloud.gateway.httpclient.response-timeout=70s

spring.cloud.gateway.routes[0].id=iam-inner
spring.cloud.gateway.routes[0].uri=http://iam_service_post_hub:8189
spring.cloud.gateway.routes[0].predicates[0]=Path=/inner/iam-service/**
spring.cloud.gateway.routes[0].filters[0]=${internal.inner.auth.filter}
spring.cloud.gateway.routes[0].filters[1]=RewritePath=/inner/iam-service(?<segment>/?.*), /inner$\{segment}

spring.cloud.gateway.routes[1].id=auth
spring.cloud.gateway.routes[1].uri=http://iam_service_post_hub:8189
spring.cloud.gateway.routes[1].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[2].id=users
spring.cloud.gateway.routes[2].uri=http://iam_service_post_hub:8189
spring.cloud.gateway.routes[2].predicates[0]=Path=/users/**
spring.cloud.gateway.routes[2].filters[0]=${internal.token.validation.filter}

spring.cloud.gateway.routes[3].id=utils-inner
spring.cloud.gateway.routes[3].uri=http://utils_service_post_hub:8185
spring.cloud.gateway.routes[3].predicates[0]=Path=/utils-service/inner/**
spring.cloud.gateway.routes[3].filters[0]=${internal.inner.auth.filter}
spring.cloud.gateway.routes[3].filters[1]=RewritePath=/utils-service/inner(?<segment>/?.*), /inner$\{segment}

spring.cloud.gateway.routes[4].id=posts
spring.cloud.gateway.routes[4].uri=http://iam_service_post_hub:8189
spring.cloud.gateway.routes[4].predicates[0]=Path=/posts/**

spring.cloud.gateway.routes[5].id=comments
spring.cloud.gateway.routes[5].uri=http://iam_service_post_hub:8189
spring.cloud.gateway.routes[5].predicates[0]=Path=/comments/**

spring.cloud.gateway.routes[6].id=action-logs
spring.cloud.gateway.routes[6].uri=http://utils_service_post_hub:8185
spring.cloud.gateway.routes[6].predicates[0]=Path=/actionLogs/**

spring.cloud.gateway.routes[7].id=iam-swagger
spring.cloud.gateway.routes[7].uri=http://iam_service_post_hub:8189
spring.cloud.gateway.routes[7].predicates[0]=Path=/iam-service/**
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/iam-service(?<segment>/?.*), /$\{segment}

spring.cloud.gateway.routes[8].id=utils-swagger
spring.cloud.gateway.routes[8].uri=http://utils_service_post_hub:8185
spring.cloud.gateway.routes[8].predicates[0]=Path=/utils-service/**
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/utils-service(?<segment>/?.*), /$\{segment}

spring.cloud.consul.enabled=false
spring.cloud.consul.discovery.enabled=false
spring.cloud.service-registry.auto-registration.enabled=false